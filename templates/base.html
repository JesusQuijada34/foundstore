<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}foundstore{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    {% block extra_head %}{% endblock %}
</head>
<body class="fluent-ui">
    <div class="liquid-bg-blobs">
        <div class="blob" style="width: 600px; height: 600px; background: #38bdf8; top: -200px; left: -200px;"></div>
        <div class="blob" style="width: 500px; height: 500px; background: #818cf8; bottom: -100px; right: -100px; animation-delay: -5s;"></div>
        <div class="blob" style="width: 400px; height: 400px; background: #c084fc; top: 40%; left: 30%; animation-delay: -10s;"></div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <img src="https://raw.githubusercontent.com/JesusQuijada34/ismyself/master/product_logo.png" alt="foundstore logo" onerror="this.src='https://via.placeholder.com/32'">
                <span>foundstore</span>
            </a>
            <div class="nav-links">
                <a href="/">Explorar</a>
                {% if github.authorized %}
                    <a href="/me">Mi Perfil</a>
                    <a href="/panel">Panel Pro</a>
                    <a href="/logout">Cerrar Sesión</a>
                {% else %}
                    <a href="/login" class="btn-login">Iniciar con GitHub</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 foundstore - Powered by Fluthin</p>
            <nav class="footer-nav">
                <a href="/help">Ayuda</a>
                <a href="https://github.com/JesusQuijada34/foundstore" target="_blank">GitHub</a>
            </nav>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
