<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}foundstore{% endblock %}</title>
    
    <!-- Fuentes y Iconos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <!-- Estilos Principales -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_head %}{% endblock %}
</head>
<body class="fluent-theme">
    <!-- Fondo Líquido Robusto (Degradados en lugar de Blobs para compatibilidad móvil) -->
    <div class="background-overlay"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <img src="{{ url_for('static', filename='logo_foundstore_transparent.png') }}" alt="foundstore" onerror="this.src='https://via.placeholder.com/32'">
                <span>foundstore</span>
            </a>
            <div class="nav-links">
                <a href="/">Explorar</a>
                {% if github.authorized %}
                    <a href="/me">Perfil</a>
                    <a href="/logout">Salir</a>
                {% else %}
                    <a href="/login" class="btn-login-nav">Entrar</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main-wrapper">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026 foundstore - Powered by Fluthin</p>
            <div class="footer-links">
                <a href="/help">Ayuda</a>
                <a href="https://github.com/JesusQuijada34/foundstore" target="_blank">GitHub</a>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
