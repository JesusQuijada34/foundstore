{% extends "base.html" %}

{% block content %}
<div class="error-container" style="text-align: center; padding: 100px 20px;">
    <h1 style="font-size: 4rem; color: #e81123;">Oops!</h1>
    <p style="font-size: 1.5rem;">{{ message or "Algo salió mal al procesar tu solicitud." }}</p>
    <a href="/" class="btn-primary" style="display: inline-block; margin-top: 30px; padding: 12px 24px; background: var(--accent-color); color: white; text-decoration: none; border-radius: 4px;">Volver al inicio</a>
</div>
{% endblock %}
