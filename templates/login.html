{% extends "base.html" %}

{% block title %}Paso 1: Identidad - foundstore{% endblock %}

{% block content %}
<div class="acrilic-card">
    <!-- Logo del producto -->
    <img src="{{ url_for('static', filename='logo_foundstore_transparent.png') }}" 
         alt="foundstore logo" 
         class="onboarding-logo">

    <!-- Cabecera de la Aventura -->
    <div class="onboarding-header">
        <h1 class="title-main">Paso 1: Identidad</h1>
        <p class="desc-main">
            Vincula tu cuenta de GitHub para sincronizar tus proyectos y empezar tu aventura en el ecosistema iflapp.
        </p>
    </div>

    <!-- Acción Principal -->
    <div class="onboarding-actions">
        <a href="{{ url_for('github.login') }}" class="btn-primary">
            <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" 
                 alt="GitHub Icon" 
                 style="width: 24px; filter: invert(1);">
            <span>Continuar con GitHub</span>
        </a>
    </div>
</div>
{% endblock %}
